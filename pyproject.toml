[project]
name = "pensyve-workspace"
version = "0.1.0"
requires-python = ">=3.10"
dependencies = [
    "fastapi>=0.115",
    "uvicorn>=0.34",
    "pydantic>=2.0,<3.0",
    "structlog>=24.0,<26.0",
    "redis[hiredis]>=5.0,<8.0",
]

[project.optional-dependencies]
dev = [
    "maturin",
    "fastembed",
    "pyright",
    "ruff",
    "pytest",
]
extraction = [
    "llama-cpp-python",
]
benchmarks = [
    "scipy",
    "numpy",
    "huggingface_hub",
]

[build-system]
requires = ["setuptools>=68.0"]
build-backend = "setuptools.build_meta"

[tool.setuptools.packages.find]
include = ["pensyve_server*"]

[tool.ruff]
target-version = "py310"
line-length = 100

[tool.ruff.lint]
select = [
    "E",    # pycodestyle errors
    "W",    # pycodestyle warnings
    "F",    # pyflakes
    "I",    # isort
    "N",    # pep8-naming
    "UP",   # pyupgrade
    "B",    # flake8-bugbear
    "SIM",  # flake8-simplify
    "RUF",  # ruff-specific rules
]
ignore = [
    "E501",  # line too long (handled by formatter)
]

[tool.ruff.lint.isort]
known-first-party = ["pensyve", "pensyve_server"]

[tool.pyright]
pythonVersion = "3.10"
typeCheckingMode = "strict"
include = [
    "pensyve_server",
    "tests/python",
    "benchmarks",
]
exclude = [
    "pensyve-python/python",  # generated by PyO3, has stubs
    ".venv",
    "target",
]
reportMissingImports = false  # pensyve._core is a native module

[tool.pytest.ini_options]
testpaths = ["tests/python"]

[dependency-groups]
dev = [
    "httpx>=0.28.1",
    "pytest>=9.0.2",
]
