name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  # ── Build Python wheels (maturin + PyO3) ───────────────────────────────────
  # Only native builds — ONNX Runtime lacks prebuilt binaries for cross-compile
  build-python:
    name: Build Python (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
          - os: macos-latest
            target: aarch64-apple-darwin
          - os: windows-latest
            target: x86_64-pc-windows-msvc
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Build wheels
        uses: PyO3/maturin-action@v1
        with:
          target: ${{ matrix.target }}
          args: --release --out dist --manifest-path pensyve-python/Cargo.toml
          manylinux: "2_28"
          before-script-linux: dnf install -y openssl-devel perl-IPC-Cmd
      - name: Upload wheels
        uses: actions/upload-artifact@v5
        with:
          name: wheels-${{ matrix.target }}
          path: dist/*.whl

  build-python-sdist:
    name: Build Python sdist
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Build sdist
        uses: PyO3/maturin-action@v1
        with:
          command: sdist
          args: --out dist --manifest-path pensyve-python/Cargo.toml
      - name: Upload sdist
        uses: actions/upload-artifact@v5
        with:
          name: wheels-sdist
          path: dist/*.tar.gz

  # ── Publish to PyPI (skipped if PYPI_TOKEN not configured) ──────────────────
  publish-pypi:
    name: Publish to PyPI
    needs: [build-python, build-python-sdist]
    runs-on: ubuntu-latest
    environment: release
    steps:
      - uses: actions/download-artifact@v8
        with:
          pattern: wheels-*
          merge-multiple: true
          path: dist/
      - name: Publish to PyPI
        if: env.PYPI_TOKEN != ''
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          password: ${{ secrets.PYPI_TOKEN }}
        env:
          PYPI_TOKEN: ${{ secrets.PYPI_TOKEN }}

  # ── Publish to npm (skipped if NPM_TOKEN not configured) ───────────────────
  publish-npm:
    name: Publish to npm
    runs-on: ubuntu-latest
    environment: release
    steps:
      - uses: actions/checkout@v5
      - uses: oven-sh/setup-bun@v2
      - name: Build TypeScript SDK
        working-directory: pensyve-ts
        run: |
          bun install
          bun run build
      - uses: actions/setup-node@v5
        with:
          node-version: "24"
          registry-url: "https://registry.npmjs.org"
      - name: Publish to npm
        if: env.HAS_NPM_TOKEN != ''
        working-directory: pensyve-ts
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
          HAS_NPM_TOKEN: ${{ secrets.NPM_TOKEN }}

  # ── Publish to crates.io (skipped if CARGO_REGISTRY_TOKEN not configured) ──
  publish-crates:
    name: Publish to crates.io
    runs-on: ubuntu-latest
    environment: release
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
      - name: Publish pensyve-core
        if: env.HAS_CARGO_TOKEN != ''
        run: cargo publish -p pensyve-core --allow-dirty
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
          HAS_CARGO_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}

  # ── Build CLI binaries (native targets only) ───────────────────────────────
  build-cli:
    name: Build CLI (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact: pensyve-cli-linux-amd64
          - os: macos-latest
            target: aarch64-apple-darwin
            artifact: pensyve-cli-macos-arm64
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact: pensyve-cli-windows-amd64
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          key: cli-${{ matrix.target }}
      - name: Build CLI
        run: cargo build --release -p pensyve-cli
      - name: Package (unix)
        if: runner.os != 'Windows'
        run: |
          mkdir -p staging
          cp target/release/pensyve staging/pensyve
          cd staging && tar czf ../${{ matrix.artifact }}.tar.gz pensyve
      - name: Package (windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          mkdir staging
          cp target/release/pensyve.exe staging/pensyve.exe
          Compress-Archive -Path staging/pensyve.exe -DestinationPath ${{ matrix.artifact }}.zip
      - name: Upload artifact
        uses: actions/upload-artifact@v5
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.artifact }}.*

  # ── Build MCP server binary (native targets only) ──────────────────────────
  build-mcp:
    name: Build MCP (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact: pensyve-mcp-linux-amd64
          - os: macos-latest
            target: aarch64-apple-darwin
            artifact: pensyve-mcp-macos-arm64
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          key: mcp-${{ matrix.target }}
      - name: Build MCP server
        run: cargo build --release -p pensyve-mcp
      - name: Package
        run: |
          mkdir -p staging
          cp target/release/pensyve-mcp staging/pensyve-mcp
          cd staging && tar czf ../${{ matrix.artifact }}.tar.gz pensyve-mcp
      - name: Upload artifact
        uses: actions/upload-artifact@v5
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.artifact }}.*

  # ── GitHub Release ─────────────────────────────────────────────────────────
  github-release:
    name: Create GitHub Release
    needs: [build-cli, build-mcp, build-python, build-python-sdist]
    if: always() && !cancelled()
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/download-artifact@v8
        with:
          path: artifacts/
      - name: Collect release assets
        run: |
          mkdir -p release-assets
          find artifacts/ -name "*.tar.gz" -o -name "*.zip" -o -name "*.whl" | while read f; do
            cp "$f" release-assets/
          done
      - name: Tag Go module
        run: |
          VERSION="${GITHUB_REF_NAME}"
          git tag "pensyve-go/${VERSION}" || true
          git push origin "pensyve-go/${VERSION}" || true
      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: release-assets/*
          draft: false
          prerelease: ${{ contains(github.ref, '-alpha') || contains(github.ref, '-beta') || contains(github.ref, '-rc') }}
