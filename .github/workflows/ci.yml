name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt
      - name: Cargo fmt
        run: cargo fmt --all -- --check
      - name: Cargo clippy
        run: cargo clippy --workspace -- -D warnings
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Python lint
        run: |
          pip install ruff pyright
          ruff check pensyve_server/ tests/
          ruff check benchmarks/ || true

  test-rust:
    name: Rust Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Run tests
        run: cargo test --workspace

  test-python:
    name: Python Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: |
          pip install uv
          uv venv .venv
          . .venv/bin/activate
          uv pip install -r pensyve_server/requirements.txt
          uv pip install maturin fastembed pytest
          maturin develop --manifest-path pensyve-python/Cargo.toml
      - name: Run tests
        run: |
          . .venv/bin/activate
          pytest tests/python/ -v

  test-typescript:
    name: TypeScript Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - name: Install and test
        working-directory: pensyve-ts
        run: |
          bun install
          bun run lint
          bun run build
          bun test

  docker:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: [lint, test-rust, test-python]
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
      - name: Build Docker image
        run: docker build -t pensyve:latest .
