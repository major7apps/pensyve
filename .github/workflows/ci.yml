name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt
      - name: Cargo fmt
        run: cargo fmt --all -- --check
      - name: Cargo clippy
        run: cargo clippy --workspace -- -D warnings
      - uses: astral-sh/setup-uv@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Python lint
        run: |
          uv sync --extra dev
          uv run ruff check pensyve_server/ integrations/ tests/
          uv run pyright pensyve_server/
      - uses: oven-sh/setup-bun@v2
      - name: TypeScript lint
        working-directory: pensyve-ts
        run: |
          bun install
          bun run lint

  test-rust:
    name: Rust Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
      - name: Run tests
        run: cargo test --workspace

  test-rust-models:
    name: Rust Tests (with models)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
      - name: Cache ONNX models
        id: model-cache
        uses: actions/cache@v5
        with:
          path: ~/.cache/huggingface
          # Key only changes when the model list changes, not on every code edit.
          # Bump the version suffix (v3, v4, ...) to force a fresh download.
          key: onnx-models-${{ runner.os }}-v3
      - name: Pre-download ONNX models
        id: download-models
        continue-on-error: true
        run: |
          pip install -q huggingface-hub
          python3 -c "
          from huggingface_hub import snapshot_download
          models = ['sentence-transformers/all-MiniLM-L6-v2', 'Alibaba-NLP/gte-base-en-v1.5']
          for model in models:
              for attempt in range(3):
                  try:
                      snapshot_download(model, allow_patterns=['onnx/*', '*.json', '*.txt'])
                      print(f'OK: {model}')
                      break
                  except Exception as e:
                      print(f'Attempt {attempt+1}/3 failed for {model}: {e}')
              else:
                  raise RuntimeError(f'Failed to download {model} after 3 attempts')
          "
      - name: Verify models available
        id: verify-models
        run: |
          if [ -d ~/.cache/huggingface/hub/models--sentence-transformers--all-MiniLM-L6-v2 ] && \
             [ -d ~/.cache/huggingface/hub/models--Alibaba-NLP--gte-base-en-v1.5 ]; then
            echo "models_ready=true" >> "$GITHUB_OUTPUT"
          else
            echo "::warning::ONNX models not available — skipping model-dependent tests"
            echo "models_ready=false" >> "$GITHUB_OUTPUT"
          fi
      - name: Run model-dependent tests
        if: steps.verify-models.outputs.models_ready == 'true'
        run: cargo test --workspace -- --ignored

  test-python:
    name: Python Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
      - uses: astral-sh/setup-uv@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Install and test
        run: |
          uv sync --extra dev
          uv run maturin develop --manifest-path pensyve-python/Cargo.toml
          uv run pytest tests/python/ -v

  test-typescript:
    name: TypeScript Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: oven-sh/setup-bun@v2
      - name: Install and test
        working-directory: pensyve-ts
        run: |
          bun install
          bun run build
          bun test

  test-go:
    name: Go Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-go@v6
        with:
          go-version: "1.22"
          cache-dependency-path: pensyve-go/go.mod
      - name: Run tests
        working-directory: pensyve-go
        run: go test ./... -v

  test-wasm:
    name: WASM Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown
      - name: Install wasm-pack
        run: curl https://rustwasm.github.io/wasm-pack/installer/init.sh -sSf | sh
      - name: Run tests
        working-directory: pensyve-wasm
        run: wasm-pack test --node

  test-gateway:
    name: Gateway Build & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
      - name: Build gateway
        run: cargo build -p pensyve-mcp-gateway
      - name: Run gateway tests
        run: cargo test -p pensyve-mcp-gateway -p pensyve-mcp-tools

