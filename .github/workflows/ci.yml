name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt
      - name: Cargo fmt
        run: cargo fmt --all -- --check
      - name: Cargo clippy
        run: cargo clippy --workspace -- -D warnings
      - uses: astral-sh/setup-uv@v7
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Python lint
        run: |
          uv sync --extra dev
          uv run ruff check pensyve_python/ integrations/ tests/
          uv run pyright pensyve_python/
      - uses: oven-sh/setup-bun@v2
      - name: TypeScript lint
        working-directory: pensyve-ts
        run: |
          bun install
          bun run lint

  test-rust:
    name: Rust Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Run tests
        run: cargo test --workspace

  test-rust-models:
    name: Rust Tests (with models)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Cache ONNX models
        uses: actions/cache@v5
        with:
          path: ~/.cache/huggingface
          key: onnx-models-${{ runner.os }}-v1
      - name: Run model-dependent tests
        run: cargo test --workspace -- --ignored

  test-python:
    name: Python Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: astral-sh/setup-uv@v7
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install and test
        run: |
          uv sync --extra dev
          uv run maturin develop --manifest-path pensyve-python/Cargo.toml
          uv run pytest tests/python/ -v

  test-typescript:
    name: TypeScript Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - name: Install and test
        working-directory: pensyve-ts
        run: |
          bun install
          bun run build
          bun test

  test-go:
    name: Go Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v6
        with:
          go-version: "1.22"
      - name: Run tests
        working-directory: pensyve-go
        run: go test ./... -v

  test-wasm:
    name: WASM Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown
      - name: Install wasm-pack
        run: curl https://rustwasm.github.io/wasm-pack/installer/init.sh -sSf | sh
      - name: Run tests
        working-directory: pensyve-wasm
        run: wasm-pack test --node

  test-gateway:
    name: Gateway Build & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Build gateway
        run: cargo build -p pensyve-mcp-gateway
      - name: Run gateway tests
        run: cargo test -p pensyve-mcp-gateway -p pensyve-mcp-tools

