[package]
name = "pensyve-python"
version = "1.0.0"
edition = "2024"
rust-version = "1.88"

[lib]
name = "pensyve_python"
crate-type = ["cdylib"]

[dependencies]
pensyve-core = { path = "../pensyve-core" }
pyo3 = { version = "^0.28.2", features = ["extension-module"] }
uuid = { version = "1", features = ["v4"] }
chrono = "0.4"
serde_json = "1"
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["json", "env-filter"] }

# Vendor OpenSSL for manylinux wheel builds (no system libssl needed).
# Must target openssl-sys directly to ensure feature unification with
# the transitive openssl-sys pulled through pensyve-core's dep tree.
openssl-sys = { version = "0.9", features = ["vendored"] }

[lints]
workspace = true
